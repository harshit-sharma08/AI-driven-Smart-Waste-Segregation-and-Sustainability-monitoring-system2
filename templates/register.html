<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — WasteAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0f0a;
      --surface:   #111911;
      --border:    #1e2e1e;
      --green:     #4ade80;
      --green-dim: #166534;
      --text:      #e8f5e8;
      --muted:     #6b7c6b;
      --error:     #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bg-blob.b1 { width: 400px; height: 400px; background: #4ade80; top: -100px; right: -100px; animation-delay: 0s; }
    .bg-blob.b2 { width: 300px; height: 300px; background: #22c55e; bottom: -80px; left: -80px; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.5s ease forwards;
      box-shadow: 0 0 60px rgba(74, 222, 128, 0.05);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--green); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
    }

    input::placeholder { color: var(--muted); }

    /* Password strength bar */
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .strength-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #0a0f0a;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(74, 222, 128, 0.3);
    }

    .btn:active  { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .link-row {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .link-row a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }
    .link-row a:hover { text-decoration: underline; }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .message.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .message.success { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.3);  color: var(--green); }
    .message.show    { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <div class="card">

    <div class="logo">
      <div class="logo-icon">♻️</div>
      <div class="logo-text">Waste<span>AI</span></div>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Join the smart waste monitoring system</p>

    <div class="message error"   id="errorMsg"></div>
    <div class="message success" id="successMsg"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a strong password"
             autocomplete="new-password" oninput="checkStrength(this.value)"/>
      <div class="strength-bar">
        <div class="strength-fill" id="strengthFill"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password"/>
    </div>

    <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>

    <div class="divider">or</div>

    <div class="link-row">
      Already have an account? <a href="/api/auth/login">Sign in</a>
    </div>

  </div>

  <script>
    // Password strength checker
    function checkStrength(password) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');

      let score = 0;
      if (password.length >= 8)            score++;
      if (/[A-Z]/.test(password))          score++;
      if (/[0-9]/.test(password))          score++;
      if (/[^A-Za-z0-9]/.test(password))  score++;

      const levels = [
        { width: '0%',   color: '',          text: '' },
        { width: '25%',  color: '#f87171',   text: 'Weak' },
        { width: '50%',  color: '#fb923c',   text: 'Fair' },
        { width: '75%',  color: '#facc15',   text: 'Good' },
        { width: '100%', color: '#4ade80',   text: 'Strong ✓' },
      ];

      fill.style.width      = levels[score].width;
      fill.style.background = levels[score].color;
      label.textContent     = levels[score].text;
      label.style.color     = levels[score].color;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleRegister();
    });

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('registerBtn');

      hideMessages();

      // Validation
      if (!username || !email || !password || !confirm) {
        showError('Please fill in all fields.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }
      if (password !== confirm) {
        showError('Passwords do not match.');
        return;
      }

      btn.disabled    = true;
      btn.innerHTML   = '<span class="spinner"></span>Creating account...';

      try {
        const response = await fetch('/api/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess('Account created! Redirecting to login...');
          setTimeout(() => window.location.href = '/api/auth/login', 1500);
        } else {
          showError(data.error || 'Registration failed. Please try again.');
          btn.disabled  = false;
          btn.innerHTML = 'Create Account';
        }

      } catch (err) {
        showError('Cannot connect to server. Is it running?');
        btn.disabled  = false;
        btn.innerHTML = 'Create Account';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideMessages() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.remove('show');
    }
  </script>

</body>
</html>
